# Alembic Configuration for TheLeadEdge
#
# Async migration support via aiosqlite.
# Production: override sqlalchemy.url via environment variable or env.py logic.

[alembic]
script_location = alembic
prepend_sys_path = src

# SQLAlchemy connection string.  env.py overrides this at runtime
# with the value from Settings.database_url or DATABASE_URL env var.
sqlalchemy.url = sqlite+aiosqlite:///./theleadedge.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
