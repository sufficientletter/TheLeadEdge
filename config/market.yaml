# =============================================================================
# TheLeadEdge - Market Configuration
# =============================================================================
# Single source of truth for the target market.
#
# ZIP CODE EDITING:
#   - To add a ZIP: add a new "- XXXXX" line under the appropriate area
#   - To remove a ZIP: delete the line or comment it out with #
#   - Each ZIP is on its own line for easy git diffs
# =============================================================================

market:
  name: "Southwest Florida"
  state: "FL"
  counties:
    - Lee
    - Collier

# -----------------------------------------------------------------------------
# MLS Platform
# -----------------------------------------------------------------------------
mls:
  board: "SWFLAMLS"
  board_name: "Southwest Florida MLS"
  platform: "Matrix"
  vendor: "CoreLogic/Cotality"

# -----------------------------------------------------------------------------
# CRM
# -----------------------------------------------------------------------------
crm:
  platform: "Follow Up Boss"

# -----------------------------------------------------------------------------
# ZIP Codes by Area
#
# To disable an area: comment out its ZIPs with #
# To add a new ZIP: add a "- XXXXX" line under the right area
# To remove a ZIP: delete the line or prefix it with #
# -----------------------------------------------------------------------------
