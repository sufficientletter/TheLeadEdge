    # - 34141  # Ochopee - Everglades, minimal residential activity

# -----------------------------------------------------------------------------
# Matrix CSV Export Settings
#
# These control how we parse CSV files exported from the Matrix MLS platform.
# -----------------------------------------------------------------------------
matrix_export:
  # Matrix can export in different encodings depending on the machine.
  # We try utf-8 first, then fall back to cp-1252 (Windows Latin-1).
  encoding_fallback:
    - utf-8
    - cp-1252

  # Matrix exports use comma-delimited CSV
  delimiter: ","

  # Matrix columns can display as "Name" (internal field name) or "Label"
  # (human-readable). We use Name for consistency and programmatic mapping.
  header_format: "Name"

  # Matrix has a limit on how many fields can be included per export.
  # Split large exports into multiple files if you exceed this.
  max_fields_per_export: 50
