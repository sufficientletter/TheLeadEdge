    type: bool
    required: false
    category: swflamls_custom
    description: "Whether the property has Gulf of Mexico water access"


# -----------------------------------------------------------------------------
# Section 3 -- Status Mapping
# -----------------------------------------------------------------------------
# Maps MLS-specific status codes and display values to RESO StandardStatus
# enum values.  The CSV importer should normalize all status values through
# this mapping before storing in the database.
#
# Each entry maps one or more raw values (case-insensitive) to the canonical
# RESO StandardStatus string.
#
# Note: "Canceled" uses the RESO spelling (one L), not "Cancelled".
# -----------------------------------------------------------------------------

status_mapping:

  Active:
    canonical: "Active"
    raw_values:
      - "Active"
      - "ACT"
      - "A"
      - "active"

  ActiveUnderContract:
    canonical: "Active Under Contract"
    raw_values:
      - "Active Under Contract"
      - "AUC"
      - "Active/Under Contract"
      - "Under Contract"
      - "active under contract"

  Pending:
    canonical: "Pending"
    raw_values:
      - "Pending"
      - "PND"
      - "P"
      - "pending"

  Closed:
    canonical: "Closed"
    raw_values:
      - "Closed"
      - "Sold"
      - "SLD"
      - "S"
      - "CL"
      - "closed"
      - "sold"

  Expired:
    canonical: "Expired"
    raw_values:
      - "Expired"
      - "EXP"
      - "E"
      - "expired"

  Withdrawn:
    canonical: "Withdrawn"
    raw_values:
      - "Withdrawn"
      - "WDN"
      - "W"
      - "withdrawn"

  Canceled:
    canonical: "Canceled"
    raw_values:
      - "Canceled"
      - "Cancelled"
      - "CAN"
      - "C"
      - "canceled"
      - "cancelled"

  ComingSoon:
    canonical: "Coming Soon"
    raw_values:
      - "Coming Soon"
      - "CS"
      - "coming soon"

  Hold:
    canonical: "Hold"
    raw_values:
      - "Hold"
      - "H"
      - "Temporarily Off Market"
      - "hold"

  Delete:
    canonical: "Delete"
    raw_values:
      - "Delete"
      - "DEL"
      - "Deleted"
      - "delete"


# -----------------------------------------------------------------------------
# Section 4 -- Boolean Value Mapping
# -----------------------------------------------------------------------------
# Matrix exports boolean fields inconsistently.  Map all known representations
# to Python True/False for reliable parsing.
# -----------------------------------------------------------------------------

boolean_mapping:
  true_values:
    - "Yes"
    - "Y"
    - "True"
    - "true"
    - "1"
    - "yes"
    - "YES"
  false_values:
    - "No"
    - "N"
    - "False"
    - "false"
    - "0"
    - "no"
    - "NO"
    - ""  # Empty string treated as false for boolean fields


# -----------------------------------------------------------------------------
# Section 5 -- Date/Datetime Format Patterns
# -----------------------------------------------------------------------------
# Matrix exports dates in various formats depending on the field type and
# export settings.  The CSV importer should try each pattern in order until
# one succeeds.
# -----------------------------------------------------------------------------

date_formats:
  date_patterns:
    - "%Y-%m-%d"          # 2026-03-02          (ISO 8601, most common)
    - "%m/%d/%Y"          # 03/02/2026          (US format)
    - "%m/%d/%y"          # 03/02/26            (US short year)
    - "%m-%d-%Y"          # 03-02-2026
    - "%Y%m%d"            # 20260302            (compact)

  datetime_patterns:
    - "%Y-%m-%dT%H:%M:%S"        # 2026-03-02T14:30:00        (ISO 8601)
    - "%Y-%m-%dT%H:%M:%S.%f"     # 2026-03-02T14:30:00.000    (ISO with ms)
    - "%Y-%m-%dT%H:%M:%SZ"       # 2026-03-02T14:30:00Z       (UTC)
    - "%Y-%m-%dT%H:%M:%S%z"      # 2026-03-02T14:30:00-05:00  (with timezone)
    - "%m/%d/%Y %H:%M:%S"        # 03/02/2026 14:30:00        (US format)
    - "%m/%d/%Y %I:%M:%S %p"     # 03/02/2026 02:30:00 PM     (US 12-hour)
    - "%Y-%m-%d %H:%M:%S"        # 2026-03-02 14:30:00        (space separated)


# -----------------------------------------------------------------------------
# Section 6 -- Validation Rules
# -----------------------------------------------------------------------------
# Constraints the CSV importer should enforce during parsing.  Records that
# fail required-field validation are logged and skipped.  Records that fail
# range validation are imported with a warning flag.
# -----------------------------------------------------------------------------

validation:
  required_fields:
    - ListingKey
    - ListingId
    - StandardStatus
    - ListPrice

  range_checks:
    ListPrice:
      min: 1000
      max: 100000000
      description: "List price must be between $1K and $100M"
    OriginalListPrice:
      min: 1000
      max: 100000000
      description: "Original list price must be between $1K and $100M"
    ClosePrice:
      min: 1000
      max: 100000000
      description: "Close price must be between $1K and $100M"
    BedroomsTotal:
      min: 0
      max: 50
      description: "Bedrooms must be between 0 and 50"
    BathroomsTotalInteger:
      min: 0
      max: 50
      description: "Bathrooms must be between 0 and 50"
    LivingArea:
      min: 100
      max: 100000
      description: "Living area must be between 100 and 100,000 sqft"
    YearBuilt:
      min: 1800
      max: 2030
      description: "Year built must be between 1800 and 2030"
    DaysOnMarket:
      min: 0
      max: 9999
      description: "DOM must be non-negative and under 10,000"
    CumulativeDaysOnMarket:
      min: 0
      max: 9999
      description: "CDOM must be non-negative and under 10,000"
    Latitude:
      min: 24.0
      max: 28.0
      description: "Latitude range for Southwest Florida"
    Longitude:
      min: -83.0
      max: -80.0
      description: "Longitude range for Southwest Florida"
